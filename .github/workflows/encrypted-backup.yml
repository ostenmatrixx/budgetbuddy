name: Encrypted production backup

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: encrypted-production-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      BUDGETBUDDY_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      BUDGETBUDDY_BACKUP_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Require backup secrets
        run: |
          test -n "$BUDGETBUDDY_DATABASE_URL"
          test -n "$BUDGETBUDDY_BACKUP_PASSPHRASE"
      - name: Create encrypted logical dump
        run: bash supabase/scripts/create-encrypted-backup.sh encrypted-backups
      - name: Upload encrypted artifacts only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: budgetbuddy-encrypted-backup-${{ github.run_id }}
          path: |
            encrypted-backups/*.tar.gz.enc
            encrypted-backups/*.tar.gz.enc.sha256
          if-no-files-found: error
          retention-days: 30
