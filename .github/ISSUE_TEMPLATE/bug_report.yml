name: Bug report
description: Report a reproducible problem that is not a security vulnerability.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve BudgetBuddy. Do not include passwords, access tokens, private database URLs, financial records, email addresses, or other personal data. Report security vulnerabilities privately using the link in the repository security policy.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A concise description of the problem and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use fictional data and the smallest reliable sequence of actions.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local development
        - Vercel Preview / staging
        - Production
        - Installed PWA
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and operating system
      placeholder: Chrome 140 on macOS 16
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Add screenshots or logs only after removing personal, financial, authentication, and secret values.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I reproduced this with fictional or staging data.
          required: true
        - label: I removed secrets, personal data, and financial data from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
