<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#af101a" />
    <title>BudgetBuddy is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        background: #f9f9fb;
        color: #1a1c1d;
        display: flex;
        margin: 0;
        min-height: 100vh;
        padding: 1.5rem;
      }

      main {
        background: #fff;
        border: 1px solid #e2e2e4;
        border-radius: 1rem;
        box-shadow: 0 12px 48px rgb(0 0 0 / 8%);
        margin: auto;
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0;
      }

      p {
        color: #5b403d;
        line-height: 1.6;
      }

      a {
        background: #af101a;
        border: 0;
        border-radius: 0.6rem;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        display: inline-block;
        padding: 0.75rem 1rem;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #121417;
          color: #f5eff0;
        }

        main {
          background: #1b1d22;
          border-color: #41373a;
        }

        p {
          color: #d7bebc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>
        BudgetBuddy can show pages that were already loaded, but saving financial data requires an
        internet connection.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
